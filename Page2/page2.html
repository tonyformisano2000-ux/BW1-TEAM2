<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../stylesheet.css" />
    <style>
      .bordo {
        fill: none;
        stroke: #00ffff;
        stroke-width: 10;
        stroke-linecap: round;
        stroke-dasharray: 283;
        stroke-dashoffset: 0;
        transition: stroke-dashoffset 0.9s linear;
      }
      .timer {
        position: relative;
        width: 120px;
        height: 120px;
      }
      #numero {
        color: white;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 40px;
        font-weight: bold;
      }
      .answers {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        width: 70%;
        max-width: 100%;
        margin-left: auto;
        margin-right: auto;
        margin-top: 100px;
      }
      .answer-btn {
        border-radius: 50px;
        color: rgb(0, 0, 0);
        font-family: "Barlow", sans-serif;
        font-size: 1em;
        font-weight: 600;
        padding: 22px 32px;
        text-align: center;
      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../stylesheet.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../stylesheet.css" />
  </head>
  <body>
    <header>
      <div>
        <img class="Logo" src="../Page1/epicode_logo.png" alt="Logo" />
      </div>
      <div class="timer">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle class="sfondo" cx="60" cy="60" r="45" />
          <circle class="bordo" id="arco" cx="60" cy="60" r="45" />
        </svg>

        <div class="numero" id="numero"></div>
      </div>
    </header>
    <!--il timer andrebbe nel header-->

    <main class="quiz-layout">
      <div>
        <h2><!-- spazione per js--></h2>
      </div>
      <div class="answers">
        <button class="answer-btn"></button>
        <button class="answer-btn"></button>
        <button class="answer-btn"></button>
        <button class="answer-btn"></button>
      </div>
    </main>
    <footer>
      <p>
        QUESTION
        <span> 1 </span>
        <span> </span>
      </p>
    </footer>

    <script>
      // timer
      let contatore = null;
      let nrDomanda = document.querySelectorAll("footer p span");
      function avviaTimer() {
        clearInterval(contatore);
        let secondi = 30;
        document.getElementById("numero").textContent = secondi;
        contatore = setInterval(function () {
          secondi = secondi - 1;
          document.getElementById("numero").textContent = secondi;
          let nascosto = 283 - (283 * secondi) / 30;
          document.getElementById("arco").style.strokeDashoffset = nascosto;

          if (secondi <= 0) {
            clearInterval(contatore);
            indice++;
            nrDomanda[0].innerText = indice + 1;
            mostraDomande();
          }
        }, 1000);
      }
      // fine timer

      // inizio quiz
      const domande = [
        {
          domanda: "Chi ha vinto il Mondiale 2006?",
          risposte: ["Francia", "Italia", "Germania", "Brasile"],
          corretta: 1,
        },

        {
          domanda:
            "Chi è il miglior marcatore della storia della Champions League?",
          risposte: ["Messi", "Cristiano Ronaldo", "Lewandowski", "Benzema"],
          corretta: 1,
        },
        {
          domanda:
            "In quale squadra ha giocato Diego Armando Maradona in Italia?",
          risposte: ["Juventus", "Roma", "Napoli", "Inter"],
          corretta: 2,
        },
        {
          domanda: "Quanti giocatori ci sono in campo per squadra?",
          risposte: ["9", "10", "11", "12"],
          corretta: 2,
        },
        {
          domanda: "Quale nazionale ha vinto più Mondiali?",
          risposte: ["Italia", "Germania", "Argentina", "Brasile"],
          corretta: 3,
        },
      ];

      let indice = 0;
      let punteggio = 0;

      const domanda = document.querySelector(".quiz-layout h2");
      const bottoni = document.querySelectorAll(".answer-btn");
      avviaTimer();

      const mostraDomande = function (arr) {
        // SE FINISCONO LE DOMANDE
        if (indice >= domande.length) {
          domanda.innerText = `Quiz finito!! Hai totalizzato ${punteggio} punti su ${domande.length}`;
          bottoni.forEach((bottone) => (bottone.style.display = "none"));
          document.querySelector(".timer").style.display = "none";
          document.querySelector("footer p").style.visibility = "hidden";
          return;
        }

        //RESETTIAMO IL TIMER
        avviaTimer();

        //QUANTE DOMANDE ABBIAMO?
        nrDomanda[1].innerText = `/ ${domande.length}`;

        //MOSTRIAMO SEMPRE LA DOMANDA CORRISPONDENTE
        domanda.innerText = domande[indice].domanda;

        //MOSTRIAMO LE RISPOSTE CORRISPONDENTI
        bottoni.forEach((bottone, i) => {
          bottone.innerText = domande[indice].risposte[i];

          //AL CLICK FAI QUESTO
          bottone.onclick = function () {
            if (i === domande[indice].corretta) {
              punteggio++;
            }
            indice++;

            nrDomanda[0].innerText = indice + 1;

            mostraDomande();
          };
        });
        return punteggio;
      };
      mostraDomande();
      
    </script>
  </body>
</html>
