<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- <link rel="stylesheet" href="/NETFLIX/netflix-style.css" /> -->
    <link rel="stylesheet" href="./biagio-style.css" />
  </head>
  <body>
    <header class="page2header">
      <div>
        <img class="Logo" src="/NETFLIX/assets/image copy.png" alt="Logo" />
      </div>
      <div class="br-logo">
        <img src="./immagini-biagio/Breaking_Bad_logo.svg.png" alt="" />
      </div>
      <div class="timer">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle class="sfondo" cx="60" cy="60" r="45" />
          <circle class="bordo" id="arco" cx="60" cy="60" r="45" />
        </svg>

        <div class="numero" id="numero"></div>
      </div>
    </header>
    <div class="page">
      <main class="quiz-layout">
        <div id="h2-wrapper">
          <h2>Domanda</h2>
        </div>
        <div class="end-btn-wrapper"></div>
        <div class="sbagliata">
          <img src="./immagini-biagio/icona chimica.avif" alt="" />
          <span>RISPOSTA SBAGLIATA</span>
        </div>
        <div class="corretta">
          <img src="./immagini-biagio/icona verde.webp" alt="" />
          <span>RISPOSTA ESATTA</span>
        </div>
        <div class="answers">
          <button class="answer-btn">kjhsf</button>
          <button class="answer-btn">ds</button>
          <button class="answer-btn">sdf</button>
          <button class="answer-btn">dsfdsf</button>
        </div>
        <div>
          <button id="back-btn">Vedi domanda precedente</button>
        </div>
        <div class="punteggio-counter">
          <p>
            <span>DOMANDA</span>
            <span>1</span>
            <span class="fucsia"></span>
          </p>
        </div>
      </main>
    </div>
    <footer class="page2footer">
      <img src="./immagini-biagio/simbolochimica2.webp" alt="" />
      <img src="./immagini-biagio/pinkman face.png" alt="" />
      <img src="./immagini-biagio/simbolochimico1.png" alt="" />
    </footer>
    <script>
      const backgrounds = [
        `    linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
    url(./immagini-biagio/bg1.jpeg)`,
        `    linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
    url(./immagini-biagio/bg2.jpeg)`,
        `    linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
    url(./immagini-biagio/bg3.png)`,
        `    linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
    url(./immagini-biagio/bg4.png)`,
        `    linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
    url(./immagini-biagio/bg5.jpeg)`,
        `    linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
    url(./immagini-biagio/bg6.png)`,
        `    linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
    url(./immagini-biagio/bg7.png)`,
        `    linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
    url(./immagini-biagio/bg8.jpeg)`,
        `    linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
    url(./immagini-biagio/bg9.jpeg)`,
        `    linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
    url(./immagini-biagio/bg10.jpeg)`,
      ];
      const breakingBadQuestions = [
        {
          question: "Qual è il vero nome di Heisenberg?",
          answers: [
            "Jesse Pinkman",
            "Walter White",
            "Saul Goodman",
            "Gus Fring",
          ],
          correct: "Walter White",
        },
        {
          question: "Qual è la malattia di Walter White?",
          answers: [
            "Tumore ai polmoni",
            "Diabete",
            "Leucemia",
            "Malattia cardiaca",
          ],
          correct: "Tumore ai polmoni",
        },
        {
          question: "Chi è il cognato di Walter?",
          answers: [
            "Mike Ehrmantraut",
            "Gus Fring",
            "Hank Schrader",
            "Todd Alquist",
          ],
          correct: "Hank Schrader",
        },
        {
          question: "Qual è il lavoro di Jesse Pinkman all'inizio?",
          answers: ["Avvocato", "Spacciatore", "Poliziotto", "Insegnante"],
          correct: "Spacciatore",
        },
        {
          question: "Come si chiama il fast food di Gus Fring?",
          answers: [
            "Los Hermanos",
            "Pollos Hermanos",
            "Chicken King",
            "El Pollo",
          ],
          correct: "Pollos Hermanos",
        },
        {
          question: "Qual è il colore della metanfetamina prodotta da Walter?",
          answers: ["Bianco", "Blu", "Giallo", "Verde"],
          correct: "Blu",
        },
        {
          question: "Chi è l'avvocato di Walter e Jesse?",
          answers: [
            "Hank Schrader",
            "Saul Goodman",
            "Mike Ehrmantraut",
            "Skyler White",
          ],
          correct: "Saul Goodman",
        },
        {
          question: "Come si chiama la moglie di Walter?",
          answers: ["Marie", "Skyler", "Jane", "Andrea"],
          correct: "Skyler",
        },
        {
          question: "Chi uccide Gus Fring?",
          answers: [
            "Jesse Pinkman",
            "Walter White",
            "Hank Schrader",
            "Mike Ehrmantraut",
          ],
          correct: "Walter White",
        },
        {
          question: "Dove producono metanfetamina nelle prime stagioni?",
          answers: [
            "In un laboratorio segreto",
            "In un camper",
            "In casa di Walter",
            "In un ristorante",
          ],
          correct: "In un camper",
        },
      ];
      let contatore = null;
      let nrDomanda = document.querySelectorAll(".punteggio-counter p span");

      function avviaTimer() {
        clearInterval(contatore);
        let secondi = 30;
        document.getElementById("numero").textContent = secondi;
        document.getElementById("arco").style.strokeDashoffset = 283;
        contatore = setInterval(function () {
          secondi = secondi - 1;
          document.getElementById("numero").textContent = Math.ceil(secondi);
          let nascosto = (283 * secondi) / 30;
          document.getElementById("arco").style.strokeDashoffset = nascosto;

          if (secondi <= 0) {
            clearInterval(contatore);
            indice++;
            nrDomanda[0].innerText = indice + 1;
            mostraDomande();
          }
        }, 1000);
      }

      let indice = 0;
      let punteggio = 0;
      let answersGiven = [];

      const backBtn = document.getElementById("back-btn");
      backBtn.addEventListener("click", function () {
        if (indice > 0) {
          indice--;

          if (answersGiven[indice] === true) {
            punteggio--;
            console.log(punteggio);
          }
          document.querySelector(".page").style.backgroundImage =
            backgrounds[Math.ceil(Math.random() * 9)];
          avviaTimer();
          mostraDomande();
        }
        // backBtn.disabled = indice === 0;
      });

      const domanda = document.querySelector(".quiz-layout h2");
      const bottoni = document.querySelectorAll(".answer-btn");
      // avviaTimer();

      const mostraDomande = function (arr) {
        // SE FINISCONO LE DOMANDE
        if (indice >= breakingBadQuestions.length) {
          clearInterval(contatore);
          domanda.innerText = `Quiz finito!! Hai totalizzato ${punteggio} punti su ${breakingBadQuestions.length}`;
          domanda.style.fontFamily = '"Montserrat" , sans-serif';
          localStorage.setItem("punteggio", punteggio);
          backBtn.style.display = "none";

          if (!document.querySelector(".reload-page-btn")) {
            const reloadBtn = document.createElement("button");
            reloadBtn.innerText += "Try the quiz again";
            reloadBtn.classList.add("answer-btn", "btn");
            document.querySelector(".end-btn-wrapper").appendChild(reloadBtn);
            reloadBtn.onclick = () => location.reload();
          }
          if (!document.querySelector(".next-page-btn")) {
            const nextPageBtn = document.createElement("a");
            nextPageBtn.innerText += "See the result";
            nextPageBtn.classList.add("answer-btn", "btn");
            nextPageBtn.setAttribute("href", "../page3/page3.html");
            document.querySelector(".end-btn-wrapper").appendChild(nextPageBtn);
          }

          bottoni.forEach((bottone) => (bottone.style.display = "none"));
          document.querySelector(".timer").style.display = "none";
          document.querySelector(".punteggio-counter p").style.visibility =
            "hidden";
          return;
        }
        const badFeedback = document.querySelector(".sbagliata");
        const goodFeedback = document.querySelector(".corretta");

        const giveBadFeedback = function () {
          badFeedback.style.display = "block";

          setTimeout(() => {
            badFeedback.style.display = "none";
          }, 2000);
        };
        const giveGoodFeedback = function () {
          goodFeedback.style.display = "block";
          setTimeout(() => {
            goodFeedback.style.display = "none";
          });
        };
        //RESETTIAMO IL TIMER
        avviaTimer();

        // QUANTE DOMANDE ABBIAMO?
        nrDomanda[0].innerText = `QUESTION  ${indice + 1}`;
        nrDomanda[1].innerHTML = `/ <span style=" color: #d20094;">${breakingBadQuestions.length}</span>`;

        //MOSTRIAMO SEMPRE LA DOMANDA CORRISPONDENTE
        domanda.innerText = breakingBadQuestions[indice].question;

        //SE L'INDICE E MAGGIORE DI 0 PESCA DALL'ARRAY UN BACKGROUND A CASO
        if (indice > 0) {
          document.querySelector(".page").style.backgroundImage =
            backgrounds[Math.ceil(Math.random() * 9)];
        }

        //MOSTRIAMO LE RISPOSTE CORRISPONDENTI
        bottoni.forEach((bottone, i) => {
          bottone.innerText = breakingBadQuestions[indice].answers[i];

          //AL CLICK FAI QUESTO
          bottone.onclick = function () {
            const correctAnswer =
              bottone.innerText === breakingBadQuestions[indice].correct;

            answersGiven[indice] = correctAnswer;

            if (correctAnswer) {
              giveGoodFeedback();
              punteggio++;
              console.log(punteggio);
            } else {
              giveBadFeedback();
            }
            indice++;
            nrDomanda[0].innerText = `QUESTION  ${indice + 1}`;
            mostraDomande();
          };
        });
      };
      mostraDomande();
    </script>
    <!-- <script src="../NETFLIX/quiz.js"></script> -->
  </body>
</html>
