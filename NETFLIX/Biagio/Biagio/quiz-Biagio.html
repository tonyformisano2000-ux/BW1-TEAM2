<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Trispace:wght@100..800&display=swap");
      @font-face {
        font-family: BreakingBad;
        src: url(./Heart\ Breaking\ Bad.otf) format("truetype");
      }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 100vh;
        font-family: "Montserrat", sans-serif;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2em;
        margin: 0;
        box-sizing: border-box;
        flex-wrap: wrap;
      }
      .br-logo img {
        width: 250px;
        height: 120px;
      }
      header img {
        width: 200px;
        height: 160px;
      }

      .page2header,
      .page3header,
      .page4header {
        background-color: black;
      }
      /* .page2header {
  display: flex;
  align-items: center;
  justify-content: space-around;
} */
      .bordo {
        fill: none;
        /* stroke: white; */
        stroke: white;
        stroke-width: 10;
        transition: none;
        stroke-dasharray: 283;
        stroke-dashoffset: 0;
        transition: stroke-dashoffset 0.9s linear;
        transform: rotate(-90deg);
        transform-origin: center;
      }
      .sfondo {
        fill: none;
        stroke: #e50914;
        stroke-width: 10;
      }
      .timer {
        position: relative;
        width: 120px;
        height: 120px;
      }
      #numero {
        color: white;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 40px;
        font-weight: bold;
      }
      .page {
        flex: 1;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
          url(./immagini-biagio/bg1.jpeg);
        background-repeat: no-repeat;
        background-size: 100% 100%;
        display: flex;
        justify-content: center;
        transition: all 3s ease-in-out;
      }
      main {
        border: 1px solid black;
        width: 60%;
        height: fit-content;
        margin: 10em 0;
        border-radius: 20px;
        box-shadow: 2px 2px 10px 2px black;
        background-color: rgba(255, 255, 255, 0.7);
        max-height: fit-content;
      }
      main:hover {
        cursor: url(./immagini-biagio/cursor.png), auto;
      }
      main h2 {
        text-align: center;
        font-size: 2.5em;
        background-color: green;
        font-weight: 400;
        color: white;
        width: fit-content;
        margin: 3em auto;
        padding: 0.3em;
        border: 2px solid black;
        border-radius: 10px;
        box-shadow: 2px 2px 10px 2px black;
        font-family: "breakingBad", sans-serif;
      }
      .answers {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 2em;
        padding: 0 2em;
        margin-bottom: 3em;
      }
      .answer-btn {
        display: inline-block;
        padding: 1em 2em;
        border-radius: 10px;
        background-color: #d6b313;
        box-shadow: 2px 2px 10px 2px;
        font-weight: bold;
        font-size: 1.2em;
      }
      .answer-btn:hover {
        background-color: green;
        color: white;
        cursor: url(./immagini-biagio/cursor.png), auto;
      }
      .punteggio-counter p {
        text-align: center;
        font-weight: 600;
      }

      .end-btn-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .btn {
        margin-top: 2em;
        text-align: center;
        text-decoration: none;
        color: blue;
      }
      #back-btn {
        background-color: #187bc1;
        padding: 0.5em 1em;
        font-weight: 600;
        margin-left: 1em;
        border-radius: 5px;
        box-shadow: 2px 2px 10px 2px;
        color: white;
      }
      #back-btn:hover {
        cursor: pointer;
        background-color: #73c0f8;
        color: black;
      }

      .sbagliata {
        background-color: #e50914;
        color: white;
      }
      .corretta {
        background-color: green;
        color: white;
      }
      footer {
        background-color: black;
        padding: 1em 0;
        display: flex;
        justify-content: space-around;
      }
      footer img {
        width: 100px;
        height: 90px;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <header class="page2header">
      <div>

        <div class="punteggio-counter">

        </div>

    </div>
    <footer class="page2footer">

    <script>
      function navigaConScroll(url) {
        document.body.style.animation = "none";
        document.body.style.opacity = "1";
        document.body.style.transform = "translateY(0px)";
        document.body.style.pointerEvents = "none";

        const dur = 900;
        const start = performance.now();

        function ease(t) {
          return t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;
        }

        requestAnimationFrame(() => {
          requestAnimationFrame((firstFrame) => {
            function frame(now) {
              const raw = Math.min((now - start) / dur, 1);
              const y = -ease(raw) * window.innerHeight;

              let x = 0;
              if (raw > 0.85) {
                x =
                  Math.sin(((raw - 0.85) / 0.15) * Math.PI * 6) *
                  4 *
                  (1 - (raw - 0.85) / 0.15);
              }

              document.body.style.transform = `translateY(${y}px) translateX(${x}px)`;

              if (raw < 1) {
                requestAnimationFrame(frame);
              } else {
                window.location.href = url;
              }
            }

            frame(firstFrame);
          });
        });
      }
      document.addEventListener("click", function () {

        audio.volume = 0.1;
        audio.play();
      });
      const backgrounds = [

    url(./immagini-biagio/bg4.png)`,
        `    linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
    url(./immagini-biagio/bg5.jpeg)`,
        `    linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),

        `    linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
    url(./immagini-biagio/bg10.jpeg)`,
      ];
      const breakingBadQuestions = [
        {
          question: "Qual è il vero nome di Heisenberg?",

      let contatore = null;
      let nrDomanda = document.querySelectorAll(".punteggio-counter p span");

      function avviaTimer() {

        contatore = setInterval(function () {
          secondi = secondi - 1;
          document.getElementById("numero").textContent = Math.ceil(secondi);
          let nascosto = (283 * secondi) / 30;
          document.getElementById("arco").style.strokeDashoffset = nascosto;

          if (secondi <= 0) {
            clearInterval(contatore);
            indice++;
            nrDomanda[0].innerText = indiceGlobale + 1;
            mostraDomande();
          }
        }, 1000);
      }

      let indice = 0;
      let punteggio = Number(localStorage.getItem("punteggioTotale")) || 0;
      let indiceGlobale = Number(localStorage.getItem("indiceGlobale")) || 8;
      let answersGiven = [];

      //BOTTONE PER TORNARE INDIETRO ANCHE SE NON SERVE

      //     }

      //     document.querySelector(".page").style.backgroundImage =

      //     // avviaTimer();

      const domanda = document.querySelector(".quiz-layout h2");

      // avviaTimer();

      const mostraDomande = function (arr) {
        // SE FINISCONO LE DOMANDE
        if (indice >= breakingBadQuestions.length) {

          //   reloadBtn.classList.add("answer-btn", "btn");

        //MOSTRIAMO LE RISPOSTE CORRISPONDENTI
        bottoni.forEach((bottone, i) => {

          //AL CLICK FAI QUESTO
          bottone.onclick = function () {
            //AZZERA IL CONTATORE
            clearInterval(contatore);

              bottone.innerText === breakingBadQuestions[indice].correct;

            bottoni.forEach((btn) => (btn.disabled = true));

            bottoni.forEach((btn) => {
              if (btn.innerText === correct) {
                btn.classList.add("corretta");

            if (correctAnswer) {
              punteggio++;

            }
            //UNA PAUSA DI 2 SECONDI PRIMA DI MOSTRARE LA PROSSIMA DOMANDA
            setTimeout(() => {
              indice++;
              indiceGlobale++;
              //RIMUOVIAMO LE CLASSI AI BOTTONI , CHE VERRANO RIASSEGNATE AL PROSSIMO GIRO
              bottoni.forEach((btn) => {
                btn.classList.remove("sbagliata", "corretta");

              mostraDomande();
            }, 2000);
            //IL NUMERINO DELLA DOMANDA CORRISPONDENTE SOTTO SI AGGIORNA

            nrDomanda[0].innerText = `QUESTION  ${indiceGlobale + 1}`;
            console.log(indiceGlobale);

      mostraDomande();
      document.addEventListener("click", function () {
