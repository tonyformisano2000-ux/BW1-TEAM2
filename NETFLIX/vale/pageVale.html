<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar Quiz</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../netflix-style.css" />
    <style>
      /* STILE VALE */
      @font-face {
        font-family: "Avatar Airbender";
        src: url("./avatar.woff") format("woff");
        font-weight: normal;
        font-style: normal;
      }

      #videoContainer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 999;
      }

      .click-hint {
        position: absolute;
        bottom: 40px;
        color: white;
        font-size: 18px;
        opacity: 0.7;
      }

      /* nascondi il quiz allínizio */
      #quiz {
        display: none;
      }

      video {
        max-width: 90%;
      }

      body {
        cursor: url("./boomerang.png"), auto;
        cursor:
          url("./boomerang.png") 16 16,
          auto;
      }

      body::before {
        background-image: url(./avatar\ wallpaper1.jpg);
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
      }

      .answer-btn {
        width: 300px;
        padding: 15px;
        margin: auto;
        border-radius: 50px;
        background: transparent;
        color: white;
        font-family: "Avatar Airbender", sans-serif;
        padding: 22px 32px;
        text-align: center;
        font-size: 1.5rem;
        font-weight: 600;
        border: none;
        border: 3px solid #bb8314;
        background: #2b1d02;
      }

      .answer-btn:hover {
        background-image: url(./Balance.jpg);
        cursor: pointer;
        border: 3px solid #2b1d02;
        color: white;
        text-shadow:
          2px 2px 4px rgba(0, 0, 0, 0.9),
          0 0 10px rgba(0, 0, 0, 0.8),
          0 0 20px rgba(0, 0, 0, 0.6);
      }

      .quiz-layout h2 {
        color: white;
        text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
        font-family: "Avatar Airbender", sans-serif;
        letter-spacing: 1px;
        font-size: 3rem;
      }

      .correct {
        background: #2ec4cc;
      }

      .wrong {
        background: #e74c3c;
      }

      .avatarLogo {
        width: 250px;
      }
    </style>
  </head>
  <body>
    <div id="videoContainer">
      <video id="introVideo" playsinline>
        <source src="./AvatarIntro.mp4" type="video/mp4" />
      </video>

      <p class="click-hint">Click to start</p>
    </div>

    <div id="quiz">
      <audio id="musicaAvatar" src="./AvatarSoundtrack.mp3" loop></audio>
      <header class="page2header">
        <div>
          <img class="Logo" src="../assets/image copy.png" alt="Logo" />
        </div>
        <div>
          <img class="avatarLogo" src="./avatarLogo.png" alt="avatar logo" />
        </div>
        <div class="timer">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle class="sfondo" cx="60" cy="60" r="45" />
            <circle class="bordo" id="arco" cx="60" cy="60" r="45" />
          </svg>

          <div class="numero" id="numero"></div>
        </div>
      </header>
      <div class="page">
        <main class="quiz-layout">
          <div>
            <h2><!--DOMANDA--></h2>
          </div>
          <div class="answers">
            <button class="answer-btn"></button>
            <button class="answer-btn"></button>
            <button class="answer-btn"></button>
            <button class="answer-btn"></button>
          </div>
        </main>
        <footer class="page2footer">
          <p>
            <span></span>
            <span> </span>
            <span class="fucsia"> </span>
          </p>
        </footer>
      </div>
    </div>

    <script>
      function navigaConScroll(url) {
        // FONDAMENTALE: ferma l'animazione CSS slideInDown prima di usare JS transform.
        // Se l'animation CSS è ancora attiva, il browser ignora completamente
        // i transform impostati via JS.
        document.body.style.animation = "none";
        document.body.style.opacity = "1";
        document.body.style.transform = "translateY(0px)";
        document.body.style.pointerEvents = "none";

        const dur = 900;
        const start = performance.now();

        function ease(t) {
          return t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;
        }

        // doppio rAF per dare tempo al browser di "commitare" il reset CSS
        requestAnimationFrame(() => {
          requestAnimationFrame((firstFrame) => {
            function frame(now) {
              const raw = Math.min((now - start) / dur, 1);
              const y = -ease(raw) * window.innerHeight;

              let x = 0;
              if (raw > 0.85) {
                x =
                  Math.sin(((raw - 0.85) / 0.15) * Math.PI * 6) *
                  4 *
                  (1 - (raw - 0.85) / 0.15);
              }

              document.body.style.transform = `translateY(${y}px) translateX(${x}px)`;

              if (raw < 1) {
                requestAnimationFrame(frame);
              } else {
                window.location.href = url;
              }
            }

            frame(firstFrame);
          });
        });
      }
      // ELEMENTI VIDEO + QUIZ

      const video = document.getElementById("introVideo");
      const container = document.getElementById("videoContainer");
      const quiz = document.getElementById("quiz");
      const audio = document.getElementById("musicaAvatar");

      // Avvio video al click
      container.addEventListener(
        "click",
        function () {
          video.volume = 0.2;
          video.play();
          // nascondi il testo dopo il click
          document.querySelector(".click-hint")?.remove();
        },
        { once: true },
      );

      // Quando finisce il video
      video.addEventListener("ended", function () {
        // musica dopo tot secondi
        setTimeout(() => {
          audio.volume = 0.03;
          audio.play().catch(() => {});
        }, 900);

        //quiz dopo tot secondi
        setTimeout(() => {
          container.style.display = "none";
          quiz.style.display = "block";

          mostraDomande();
        }, 2500);
      });

      // TIMER
      let contatore = null;
      let nrDomanda = document.querySelectorAll("footer p span");

      function avviaTimer() {
        clearInterval(contatore);
        let secondi = 30;

        document.getElementById("numero").textContent = secondi;
        document.getElementById("arco").style.strokeDashoffset = 283;

        contatore = setInterval(function () {
          secondi--;

          document.getElementById("numero").textContent = Math.ceil(secondi);

          let nascosto = (283 * secondi) / 30;
          document.getElementById("arco").style.strokeDashoffset = nascosto;

          if (secondi <= 0) {
            clearInterval(contatore);
            indice++;
            indiceGlobale++;
            mostraDomande();
          }
        }, 1000);
      }

      // DOMANDE VALE

      const domande = [
        {
          domanda: "Qual e' il tipo di te' preferito di Zio Iroh?",
          risposte: [
            "Te' al gelsomino",
            "Te' al giglio",
            "Te' del Loto Bianco",
            "Te' al ginseng",
          ],
          corretta: 3,
        },
        {
          domanda:
            "Quale Avatar incontro' Aang durante il Solstizio d’Inverno?",
          risposte: [
            "Avatar Kyoshi",
            "Avatar Roku",
            "Avatar Kuruk",
            "Avatar Yangchen",
          ],
          corretta: 1,
        },
        {
          domanda: "Quale materiale uso' Sokka per creare la sua spada?",
          risposte: ["Oro", "Platino", "Meteorite", "Giada"],
          corretta: 2,
        },
        {
          domanda:
            "Chi fu il primo membro del gruppo a dare una possibilita' a Zuko dopo che cerco' di fare amicizia con loro al Tempio dell’Aria?",
          risposte: ["Aang", "Sokka", "Katara", "Toph"],
          corretta: 3,
        },
      ];

      let indice = 0;
      let punteggio = Number(localStorage.getItem("punteggioTotale")) || 0;
      let indiceGlobale = Number(localStorage.getItem("indiceGlobale")) || 4;

      const domanda = document.querySelector(".quiz-layout h2");
      const bottoni = document.querySelectorAll(".answer-btn");

      //  MOSTRA DOMANDE

      function mostraDomande() {
        // fine quiz
        if (indice >= domande.length) {
          localStorage.setItem("punteggioTotale", punteggio);
          localStorage.setItem("indiceGlobale", 8);

          const overlay = document.createElement("div");
          overlay.style.position = "fixed";
          overlay.style.bottom = "0";
          overlay.style.left = "0";
          overlay.style.width = "100%";
          overlay.style.height = "0";
          overlay.style.backgroundColor = "#3498db";
          overlay.style.zIndex = "9999";

          document.body.appendChild(overlay);

          gsap.to(overlay, {
            duration: 1,
            height: "100%",
            ease: "power2.inOut",
            onComplete: () => {
              window.location.href = "../Biagio/Biagio/quiz-Biagio.html";
            },
          });

          gsap.to(document.body, {
            duration: 0.6,
            opacity: 0,
            ease: "power2.inOut",
          });

          return;
        }

        // reset timer
        avviaTimer();

        // QUANTE DOMANDE ABBIAMO?
        nrDomanda[0].innerText = `QUESTION  ${indiceGlobale + 1}`;
        nrDomanda[1].innerHTML = `/ <span style="color: #bb8314;">20</span>`;

        // domanda
        domanda.innerText = domande[indice].domanda;

        // risposte
        bottoni.forEach((bottone, i) => {
          bottone.innerText = domande[indice].risposte[i];

          bottone.onclick = function () {
            bottoni.forEach((btn) => (btn.disabled = true));

            if (i === domande[indice].corretta) {
              bottone.classList.add("correct");
              punteggio++;
            } else {
              bottone.classList.add("wrong");
              bottoni[domande[indice].corretta].classList.add("correct");
            }

            setTimeout(() => {
              bottoni.forEach((btn) => {
                btn.classList.remove("correct", "wrong");
                btn.disabled = false;
              });

              indice++;
              indiceGlobale++;
              mostraDomande();
            }, 1000);
          };
        });
      }
    </script>
  </body>
</html>
