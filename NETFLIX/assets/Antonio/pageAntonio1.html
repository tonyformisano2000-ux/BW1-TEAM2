    <style>
      @import url("https://fonts.googleapis.com/css2?family=Jersey+15&display=swap");
      .page {
        background-image: url("./showMeWhatYou'veGot.jpg");
        background-size: 100% 100%;
        background-repeat: no-repeat;

        min-width: 100%;

        padding: 0;
        min-height: none;
      }
      header {
        margin: 0;
      }
      #h2 {
        background: url(./alien.png);
        background-repeat: no-repeat;
        background-size: 200px auto;
        background-position-x: 100px;
        margin-top: 30px;
        align-items: center;

        min-height: 300px;
      }
      h2 {
        margin-top: 33px !important;
        display: inline-block;
        padding: 20px 40px;
        color: rgb(0, 0, 0);
        background-color: rgb(235, 235, 235);
        border-style: inset;
        font-size: 20pt;
        font-family: "Jersey 15", sans-serif;
        font-weight: 400;
        font-style: normal;
      }
      h1 {
        color: rgb(0, 0, 0);
        font-size: 50pt;
        font-family: "Jersey 15", sans-serif;
        font-weight: 00;
        font-style: normal;
        margin: 35px;
        display: inline-block;
        font-size: 4rem;
        animation: wave 2s ease-in-out infinite;
      }

      @keyframes wave {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      .answer-btn {
        margin: auto;
        transition: color 1s;
        overflow: hidden;
      }
      .answer-btn:hover {
        background:
          url("portal.gif"),
          radial-gradient(ellipse, rgb(28, 55, 1), rgb(128, 255, 0));
        /* background-image: ; */
        background-size: auto 120%;
        background-repeat: no-repeat;
        background-position: center;
        position: relative;
        cursor: pointer;
        border: 5px solid rgb(128, 255, 0);
        transform: scale(1.1);
        transition-delay: 0.2s;
        color: rgb(255, 0, 0);
        animation: glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both
          infinite;
        box-shadow: 0 0 12px 2px rgb(128, 255, 0);
      }

      /* Keyframes for melting effect */
      @keyframes melt {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(20px);
        }
      }

      @keyframes drip {
        0%,
        100% {
          transform: scaleY(1);
          opacity: 0.5;
        }
        50% {
          transform: scaleY(1.5);
          opacity: 0.7;
        }
      }

      @keyframes drip {
        0%,
        100% {
          transform: scaleY(1);
          opacity: 0.5;
        }
        50% {
          transform: scaleY(1.5);
          opacity: 0.7;
        }
      }
      /* glitch */
      @keyframes glitch {
        0% {
          transform: translate(0);
        }
        20% {
          transform: translate(1px, 1px);
        }
        40% {
          transform: translate(1px, -1px);
        }
        60% {
          transform: translate(2px, 2px);
        }
        80% {
          transform: translate(-1px, -3);
        }
        100% {
          transform: translate(0);
        }
      }
      .answers {
        margin-top: 0;
      }
      /* impact */
      .answer-btn:hover::before,
      .answer-btn:hover::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 90%;
        height: 70%;
        border-radius: 50%;
        transform: translate(50%, 50%) scale(0);
        animation: burst 0.3s ease-out forwards;
      }
      .answer-btn:hover::before {
        background: radial-gradient(
          circle,
          rgba(128, 255, 1, 0.7),
          transparent
        );
        z-index: -1;
      }

      .answer-btn:hover::after {
        background: radial-gradient(circle, rgba(128, 255, 1), transparent);
        z-index: -2;
      }

      @keyframes burst {
        0% {
          transform: translate(-50%, -50%) scale(0);
          opacity: 1;
        }
        50% {
          opacity: 0.8;
        }
        100% {
          transform: translate(-50%, -50%) scale(1.5);
          opacity: 0;
        }
      }

      .page2footer {
        display: inline-block;
        border-radius: 10px;
        background-color: rgba(101, 101, 101, 0.8);
        margin: 20px auto;
        padding: 0 10px;
      }
      .page2footer p {
        display: inline-block;
      }

    <!-- ---------------------------------------------------------------------JAVASCRIPT----------------------------------------------------------------------- -->
    <script>
      function navigaConScroll(url) {
        // FONDAMENTALE: ferma l'animazione CSS slideInDown prima di usare JS transform.
        // Se l'animation CSS è ancora attiva, il browser ignora completamente
        // i transform impostati via JS.
        document.body.style.animation = "none";
        document.body.style.opacity = "1";
        document.body.style.transform = "translateY(0px)";
        document.body.style.pointerEvents = "none";

        const dur = 900;
        const start = performance.now();

        function ease(t) {
          return t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;
        }

        // doppio rAF per dare tempo al browser di "commitare" il reset CSS
        requestAnimationFrame(() => {
          requestAnimationFrame((firstFrame) => {
            function frame(now) {
              const raw = Math.min((now - start) / dur, 1);
              const y = -ease(raw) * window.innerHeight;

              let x = 0;
              if (raw > 0.85) {
                x =
                  Math.sin(((raw - 0.85) / 0.15) * Math.PI * 6) *
                  4 *
                  (1 - (raw - 0.85) / 0.15);
              }

              document.body.style.transform = `translateY(${y}px) translateX(${x}px)`;

              if (raw < 1) {
                requestAnimationFrame(frame);
              } else {
                window.location.href = url;
              }
            }

            frame(firstFrame);
          });
        });
      }
      // LOGICA PAGE 2
      // timer
      let contatore = null;
      let nrDomanda = document.querySelectorAll("footer p span");

      function avviaTimer() {
        clearInterval(contatore);
        let secondi = 30;
        document.getElementById("numero").textContent = secondi;
        document.getElementById("arco").style.strokeDashoffset = 283;
        contatore = setInterval(function () {
          secondi = secondi - 1;
          document.getElementById("numero").textContent = Math.ceil(secondi);
          let nascosto = (283 * secondi) / 30;
          document.getElementById("arco").style.strokeDashoffset = nascosto;

          if (secondi <= 0) {
            clearInterval(contatore);
            indice++;
            indiceGlobale++;
            nrDomanda[0].innerText = indice + 1;
            mostraDomande();
          }
        }, 1000);
      }
      // fine timer
      //SCALA STELLINE
      const stars = document.querySelectorAll("#stars span");
      let savedIndex = -1;

      stars.forEach((star, indice) => {
        star.addEventListener("click", () => {
          savedIndex = indice;
          stars.forEach((s, i) =>
            s.classList.toggle("clicked", i <= savedIndex),
          );
        });

        star.addEventListener("mouseenter", () => {
          star.classList.add("hovered");
          stars.forEach((s, i) => s.classList.toggle("clicked", i <= indice));
        });

        star.addEventListener("mouseleave", () => {
          star.classList.remove("hovered");
          stars.forEach((s, i) =>
            s.classList.toggle("clicked", i <= savedIndex),
          );
        });
      });

      // js per la parte delle stelle
      // inizio quiz
      const domande = [
        {
          domanda: "Qual è il codice della dimensione d'origine di Rick ?",
          risposte: ["C-132", "C-137", "D-99", "K-83"],
          corretta: 2,
        },

        {
          domanda: `Cosa significa la famosa esclamazione di Rick "Wubba Lubba Dub-Dub" ?`,
          risposte: [
            "Facciamo festa fino all'alba!",
            "Non mi importa di nulla.",
            "Sto provando un grande dolore, aiutatemi.",
            "Sei il mio migliore amico",
          ],
          corretta: 3,
        },
        {
          domanda: `Come si chiamano le creature azzurre che vengono evocate
              da una scatola per risolvere un singolo compito e poi sparire?`,
          risposte: [
            "I Cromuloni",
            "I Gazorpiani",
            "I Meeseeks",
            "Gli Zigeriani",
          ],
          corretta: 3,
        },
        {
          domanda: `Cosa cercano di rubare a Rick gli alieni Zigeriani tramite
            una complessa simulazione virtuale?`,
          risposte: [
            "Il liquido per i portali dimensionali.",
            "La formula della Materia Oscura Concentrata",
            "I progetti della Cittadella dei Rick",
            "La ricetta della salsa Szechuan di McDonald's",
          ],
          corretta: 2,
        },
      ];
      let indice = 0;
      let punteggio = Number(localStorage.getItem("punteggioTotale")) || 0;
      let indiceGlobale = Number(localStorage.getItem("indiceGlobale")) || 12;
      const domanda = document.querySelector(".quiz-layout h2");
      const bottoni = document.querySelectorAll(".answer-btn");
      avviaTimer();

      let xAudio = 1;
      let yAudio = 1;
      const mostraDomande = function (arr) {
        // SE FINISCONO LE DOMANDE
        if (indice >= domande.length) {
          localStorage.setItem("punteggioTotale", punteggio);
          localStorage.setItem("indiceGlobale", 16);
          window.location.href = "../../demonSlayer/Slayer.html";
        }

        //RESETTIAMO IL TIMER
        avviaTimer();

        // QUANTE DOMANDE ABBIAMO?
        nrDomanda[0].innerText = `QUESTION  ${indiceGlobale + 1}`;
        nrDomanda[1].innerHTML = `/ <span style="color: #bb8314;">20</span>`;

        //MOSTRIAMO SEMPRE LA DOMANDA CORRISPONDENTE
        domanda.innerText = domande[indice].domanda;

        //MOSTRIAMO LE RISPOSTE CORRISPONDENTI
        bottoni.forEach((bottone, i) => {
          bottone.innerText = domande[indice].risposte[i];

          //AL CLICK FAI QUESTO
          bottone.onclick = function () {
            if (i === domande[indice].corretta - 1) {
              punteggio++;
              const trueFalse = document.querySelector(".page2footer");
              const getSwifty = document.createElement("img");
              getSwifty.src =
                "./get-schwifty-clip-art-illustration-smile-cartoon-rick-and-morty-portal-76d609b09e14a451a1c3882e61bc81d3.png";
              getSwifty.style.height = "30px";
              trueFalse.appendChild(getSwifty);
              const audio = document.querySelector(
                `.positive audio:nth-of-type(${xAudio})`,
              );
              xAudio++;
              audio.play();
            } else {
              const trueFalse = document.querySelector(".page2footer");
              const wrong = document.createElement("img");
              wrong.src = "./alien.png";
              wrong.style.height = "30px";
              trueFalse.appendChild(wrong);
              const audio = document.querySelector(
                `.negative audio:nth-of-type(${yAudio})`,
              );
              yAudio++;
              audio.play();
            }

            indice++;
            indiceGlobale++;

            nrDomanda[0].innerText = `QUESTION  ${indiceGlobale + 1}`;

            mostraDomande();
          };
        });
      };
      mostraDomande();

      const showMeWhatYouVeGot = document.querySelector("h1").innerText;
      console.log(showMeWhatYouVeGot);
      for (x = 0; x < 19; x++) {
        console.log(x);
        const wave = document.querySelector(`h1 span:nth-child(${x + 1})`);
        wave.setAttribute("style", `animation-delay:0.${x}s`);
      }
