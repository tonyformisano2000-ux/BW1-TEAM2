<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        background-image: url("./assets/bg.jpg");
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        height: 42px;
        width: auto;
        display: block;
      }
      .sfondo {
        fill: none;
        stroke: lightgray;
        stroke-width: 8;
      }
      .bordo {
        fill: none;
        stroke: #00ffff;
        stroke-width: 10;
        stroke-linecap: round;
        stroke-dasharray: 283;
        stroke-dashoffset: 0;
        transition: stroke-dashoffset 0.9s linear;
      }
      .timer {
        position: relative;
        width: 120px;
        height: 120px;
      }
      #numero {
        color: white;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 40px;
        font-weight: bold;
      }
      .question {
        text-align: center;
        color: white;
        max-width: 100%;
      }

      .question p {
        font-size: 3.5em;
        width: 50%;
        margin-right: auto;

        margin-left: auto;
      }
      .answers {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        width: 70%;
        max-width: 100%;
        margin-left: auto;
        margin-right: auto;
        margin-top: 100px;
      }
      .answer-btn {
        border-radius: 50px;
        color: rgb(0, 0, 0);
        font-family: "Barlow", sans-serif;
        font-size: 1em;
        font-weight: 600;
        padding: 22px 32px;
        text-align: center;
      }
      .label {
        font-size: 12px;
        opacity: 0.8;
      }

      .remaining {
        font-size: 12px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="./assets/epicode_logo.png" class="logo" alt="epicod logo" />
      <div class="timer">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle class="sfondo" cx="60" cy="60" r="45" />
          <circle class="bordo" id="arco" cx="60" cy="60" r="45" />
        </svg>

        <div class="numero" id="numero"></div>
      </div>
    </header>
    <main class="container">
      <div class="question">
        <p>How can I create a <strong>checkbox in HTML?</strong></p>
      </div>
      <div class="answers">
        <button class="answer-btn">&lt;input type = "check"&gt;</button>
        <button class="answer-btn">&lt;input type = "checkbox"&gt;</button>
        <button class="answer-btn">&lt;checkbox&gt;</button>
        <button class="answer-btn">&lt;input type = "button"&gt;</button>
      </div>
    </main>
    <script>
      // timer
      let secondi = 30;
      let contatore = null;
      function avviaTimer() {
        document.getElementById("numero").textContent = secondi;
        contatore = setInterval(function () {
          secondi = secondi - 1;
          document.getElementById("numero").textContent = secondi;
          let nascosto = 283 - (283 * secondi) / 30;
          document.getElementById("arco").style.strokeDashoffset = nascosto;

          if (secondi <= 0) {
            clearInterval(contatore);
          }
        }, 1000);
      }
      // fine timer
      // inizio quiz
      const domande = [
        {
          domanda: "Chi ha vinto il Mondiale 2006?",
          risposte: ["Francia", "Italia", "Germania", "Brasile"],
          corretta: 1,
        },
        {
          domanda:
            "Chi è il miglior marcatore della storia della Champions League?",
          risposte: ["Messi", "Cristiano Ronaldo", "Lewandowski", "Benzema"],
          corretta: 1,
        },
        {
          domanda:
            "In quale squadra ha giocato Diego Armando Maradona in Italia?",
          risposte: ["Juventus", "Roma", "Napoli", "Inter"],
          corretta: 2,
        },
        {
          domanda: "Quanti giocatori ci sono in campo per squadra?",
          risposte: ["9", "10", "11", "12"],
          corretta: 2,
        },
        {
          domanda: "Quale nazionale ha vinto più Mondiali?",
          risposte: ["Italia", "Germania", "Argentina", "Brasile"],
          corretta: 3,
        },
      ];
    </script>
  </body>
</html>
