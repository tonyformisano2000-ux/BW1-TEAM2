<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .sfondo {
        fill: none;
        stroke: lightgray;
        stroke-width: 8;
      }
      .bordo {
        fill: none;
        stroke: #9b1d8d;
        stroke-width: 10;
        stroke-linecap: round;
        stroke-dasharray: 283;
        stroke-dashoffset: 0;
        transition: stroke-dashoffset 0.9s linear;
      }
      .timer {
        position: relative;
        width: 120px;
        height: 120px;
      }
      #numero {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 40px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="timer">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle class="sfondo" cx="60" cy="60" r="45" />
        <circle class="bordo" id="arco" cx="60" cy="60" r="45" />
      </svg>
      <div class="numero" id="numero"></div>
    </div>

    <script>
      let secondi = 20;
      let contatore = null;
      function avviaTimer() {
        document.getElementById("numero").textContent = secondi;
        contatore = setInterval(function () {
          secondi = secondi - 1;
          document.getElementById("numero").textContent = secondi;
          let nascosto = 283 - (283 * secondi) / 20;
          document.getElementById("arco").style.strokeDashoffset = nascosto;

          if (secondi <= 0) {
            clearInterval(contatore);
          }
        }, 1000);
      }
      avviaTimer();
    </script>
  </body>
</html>
